<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Cozinha - Monitor SaaS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        .topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .topo h1 { font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
        .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
        .pedido-card { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 15px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); }
        .pedido-topo { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 6px; font-size: 0.85rem; color: #94a3b8; }
        .pedido-itens { margin: 10px 0; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; font-size: 0.9rem; border-left: 3px solid #dc2626; }
        .pedido-info { font-size: 0.8rem; color: #cbd5e1; line-height: 1.5; margin-bottom: 12px; }
        .pedido-acoes { display: flex; gap: 8px; }
        .btn-acao { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; color: white; }
        .btn-status-pendente { background: #ea580c; }
        .btn-status-concluir { background: #16a34a; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
</head>
<body>

    <div class="container">
        <div class="topo">
            <h1><i class="fa-solid fa-kitchen-set" style="color:#ef4444;"></i> Pedidos da Cozinha</h1>
            <a id="btn-config" href="#" class="btn-voltar"><i class="fa-solid fa-gear"></i> Painel</a>
        </div>

        <div id="lista-pedidos-cozinha"><p style="text-align:center; color:#94a3b8; margin-top:40px;">Carregando monitor de pedidos...</p></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lojaId = urlParams.get('loja');

        if (sessionStorage.getItem('fomezero_logado_' + lojaId) !== 'true') {
            window.location.href = 'login.html?loja=' + lojaId;
        }

        document.getElementById('btn-config').href = 'painel.html?loja=' + lojaId;

        document.addEventListener("DOMContentLoaded", () => {
            database.ref('lojas/' + lojaId + '/pedidos').on('value', (snapshot) => {
                const pedidosObjeto = snapshot.val();
                renderizarPedidosCozinha(pedidosObjeto);
            });
        });

        function renderizarPedidosCozinha(pedidosObjeto) {
            const container = document.getElementById('lista-pedidos-cozinha');
            container.innerHTML = '';

            if(!pedidosObjeto) {
                container.innerHTML = "<p style='text-align:center; color:#94a3b8; margin-top:40px;'>Nenhum pedido pendente na cozinha! 😴</p>";
                return;
            }

            Object.keys(pedidosObjeto).reverse().forEach(id => {
                const p = pedidosObjeto[id];
                
                if(p.status !== 'entregue') {
                    let itensTxt = '';
                    p.itens.forEach(i => { itensTxt += `<div>• ${i.qtd}x ${i.nome}</div>`; });

                    let acaoBotao = p.status === 'pendente' 
                        ? `<button onclick="mudarStatusPedido('${id}', 'preparo')" class="btn-acao btn-status-pendente">⚡ Começar Preparo</button>`
                        : `<button onclick="mudarStatusPedido('${id}', 'entregue')" class="btn-acao btn-status-concluir">✓ Concluir / Entregue</button>`;

                    let statusNome = p.status === 'pendente' ? '⏳ Pendente' : '🍳 Em Preparo';

                    container.innerHTML += `
                        <div class="pedido-card">
                            <div class="pedido-topo">
                                <span>Status: <strong>${statusNome}</strong></span>
                                <span>Total: <strong>R$ ${p.total.toFixed(2)}</strong></span>
                            </div>
                            <div class="pedido-info">
                                <strong>Cliente:</strong> ${p.cliente} (${p.telefone})<br>
                                <strong>Endereço:</strong> ${p.endereco}<br>
                                <strong>Pagamento:</strong> ${p.pagamento} | <strong>Taxa:</strong> R$ ${p.taxa.toFixed(2)}
                            </div>
                            <div class="pedido-itens">${itensTxt}</div>
                            <div class="pedido-acoes">${acaoBotao}</div>
                        </div>
                    `;
                }
            });

            if(container.innerHTML === '') {
                container.innerHTML = "<p style='text-align:center; color:#94a3b8; margin-top:40px;'>Nenhum pedido pendente na cozinha! 😴</p>";
            }
        }

        function mudarStatusPedido(id, novoStatus) {
            // Atualiza diretamente a nuvem, o painel lê de lá e atualiza o faturamento na hora!
            database.ref('lojas/' + lojaId + '/pedidos/' + id).update({ status: novoStatus });
        }
    </script>
</body>
</html>
