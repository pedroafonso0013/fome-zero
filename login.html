<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Painel SaaS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: rgba(255, 255, 255, 0.95); padding: 40px 30px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        .logo-area { margin-bottom: 25px; }
        .logo-area i { font-size: 3rem; color: #dc2626; background: #fee2e2; padding: 15px; border-radius: 50%; }
        .logo-area h1 { font-size: 1.4rem; color: #1e293b; margin-top: 12px; font-weight: 800; }
        .logo-area p { font-size: 0.8rem; color: #64748b; margin-top: 4px; }
        .form-group { margin-bottom: 20px; text-align: left; position: relative; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; color: #475569; margin-bottom: 6px; text-transform: uppercase; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.input-icon { position: absolute; left: 12px; color: #94a3b8; }
        input { width: 100%; background: #f8fafc; border: 1px solid #cbd5e1; padding: 12px 12px 12px 40px; border-radius: 8px; font-size: 0.9rem; outline: none; }
        .btn-toggle-senha { position: absolute; right: 12px; background: none; border: none; color: #94a3b8; cursor: pointer; }
        .btn-entrar { width: 100%; background: #dc2626; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .msg-erro { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; display: none; align-items: center; gap: 8px; text-align: left; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <i class="fa-solid fa-lock"></i>
            <h1 id="titulo-login">Painel Administrativo</h1>
            <p>Insira suas credenciais de acesso</p>
        </div>

        <div id="erro-box" class="msg-erro">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="erro-txt">Usuário ou senha incorretos.</span>
        </div>

        <form id="login-form" onsubmit="executarLogin(event)">
            <div class="form-group">
                <label>Usuário</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="login-user" placeholder="admin" required>
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-key input-icon"></i>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                    <button type="button" onclick="toggleSenhaVisivel()" class="btn-toggle-senha" id="btn-olho"><i class="fa-solid fa-eye"></i></button>
                </div>
            </div>

            <button type="submit" class="btn-entrar" id="btn-submit">
                <span id="btn-texto">Entrar no Sistema</span>
                <div class="spinner" id="btn-spinner"></div>
            </button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lojaId = urlParams.get('loja');

        if(!lojaId) {
            alert("Erro: Link de acesso inválido. Falta o identificador da loja.");
            document.body.innerHTML = "<h2 style='color:white; text-align:center; margin-top:50px;'>Por favor, use o link correto enviado pelo administrador.</h2>";
        }

        if(sessionStorage.getItem('fomezero_logado_' + lojaId) === 'true') {
            window.location.href = 'painel.html?loja=' + lojaId;
        }

        function toggleSenhaVisivel() {
            const input = document.getElementById('login-pass');
            const olho = document.getElementById('btn-olho').querySelector('i');
            if(input.type === 'password') { input.type = 'text'; olho.className = 'fa-solid fa-eye-slash'; }
            else { input.type = 'password'; olho.className = 'fa-solid fa-eye'; }
        }

        function ejecutarLogin(event) {
            event.preventDefault();
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const erroBox = document.getElementById('erro-box');
            const btnTexto = document.getElementById('btn-texto');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnSubmit = document.getElementById('btn-submit');

            erroBox.style.display = 'none';
            btnTexto.style.display = 'none';
            btnSpinner.style.display = 'block';
            btnSubmit.disabled = true;

            database.ref('lojas/' + lojaId + '/credenciais').once('value').then((snapshot) => {
                const credenciais = snapshot.val() || { usuario: "admin", senha: "admin123" };
                
                if(user === credenciais.usuario && pass === credenciais.senha) {
                    sessionStorage.setItem('fomezero_logado_' + lojaId, 'true');
                    window.location.href = 'painel.html?loja=' + lojaId;
                } else {
                    throw new Error();
                }
            }).catch(() => {
                erroBox.style.display = 'flex';
                btnTexto.style.display = 'block';
                btnSpinner.style.display = 'none';
                btnSubmit.disabled = false;
            });
        }
    </script>
</body>
</html>
